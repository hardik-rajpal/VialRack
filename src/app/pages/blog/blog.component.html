<section class="writeups">
    <header class="writeups__head">
        <h1 class="writeups__title">Writeups</h1>
        <p class="writeups__sub">
            Mostly poems, posted on <a [href]="profile" target="_blank" rel="noopener noreferrer">Medium</a>.
        </p>
    </header>

    <div class="clippings" *ngIf="stories.length; else state">
        <a class="clip" *ngFor="let s of stories" [href]="s.link" target="_blank" rel="noopener noreferrer">
            <span class="clip__photo" *ngIf="s.image">
                <img [src]="s.image" alt="" loading="lazy">
            </span>
            <span class="clip__body">
                <span class="clip__meta">{{ s.date }} · {{ s.readingMins }} min read</span>
                <span class="clip__title">{{ s.title }}</span>
                <span class="clip__snippet" *ngIf="s.snippet">{{ s.snippet }}</span>
                <span class="clip__tags" *ngIf="s.tags.length">
                    <span class="tag" *ngFor="let t of s.tags.slice(0, 3)">{{ t }}</span>
                </span>
            </span>
        </a>
    </div>

    <ng-template #state>
        <p class="writeups__empty">{{ loaded ? 'No stories yet.' : 'Fetching the latest from Medium…' }}</p>
    </ng-template>

    <p class="writeups__foot">
        Older docs live in <a [href]="driveUrl" target="_blank" rel="noopener noreferrer">this Drive folder</a>.
    </p>
</section>
