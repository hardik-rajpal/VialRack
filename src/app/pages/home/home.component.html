<section class="study">
    <p class="study__eyebrow">Pull something off the shelf.</p>

    <div class="study__cabinet">
        <span class="tag">still under construction — mind the sawdust</span>
        <app-shelfstack>
            <app-shelf *ngFor="let shelf of shelves">
                <app-imglink
                    *ngFor="let item of shelf"
                    [label]="item.label"
                    [link]="item.link"
                    [cover]="item.cover"
                    [note]="item.note || ''"
                    [plaqueType]="item.plaqueType || 1">
                </app-imglink>
            </app-shelf>
        </app-shelfstack>
    </div>
</section>
