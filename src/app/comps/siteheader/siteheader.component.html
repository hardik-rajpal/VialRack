<header class="masthead">
    <a class="brand" routerLink="/" [attr.aria-label]="data.title + ' — home'">
        <img class="brand__mark" src="{{ data.logo }}" alt="">
        <span class="brand__text">
            <span class="brand__title">{{ data.title }}</span>
            <span class="brand__sub" *ngIf="data.subtitle">{{ data.subtitle }}</span>
        </span>
    </a>
    <app-navbar class="masthead__nav"></app-navbar>
</header>
<div class="masthead__rule" aria-hidden="true"></div>
